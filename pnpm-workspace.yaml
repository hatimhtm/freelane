# pnpm 11.5 build-script approval (moved here from package.json's "pnpm" field).
# These five ship prebuilt native binaries via their platform optional deps
# (@img/sharp-darwin-arm64, @next/swc, the unrs resolver binding, etc.), so
# their install/build scripts aren't needed — the binaries resolve at runtime
# without them. Marking each false (decided) is what stops ERR_PNPM_IGNORED_BUILDS
# from making `pnpm install` exit non-zero, which would otherwise break
# `pnpm dev` (its pre-run dependency check runs `pnpm install`). Verified:
# `next build` and `next dev` both work with these scripts unrun.
allowBuilds:
  '@google/genai': false
  msw: false
  protobufjs: false
  sharp: false
  unrs-resolver: false
