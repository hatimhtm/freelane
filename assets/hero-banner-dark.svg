  <text class="mono" x="1150" y="158" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">v2.0</text>
  <text class="mono" x="1150" y="178" text-anchor="middle" font-size="13" fill="#1A1A1A" letter-spacing="2">PERSONAL</text>

  <text class="mono" x="60" y="378" font-size="12" fill="#FFFDF5" letter-spacing="4">/// PROJECTS · INVOICES · PAYMENTS · EXPENSES · CLIENTS · FX-AUTO-FETCH ///</text>
